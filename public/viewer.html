<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>글 보기</title>
<link rel="stylesheet" href="assets/style.css">
<script type="module" src="https://cdn.jsdelivr.net/npm/zero-md@2?register"></script>
</head>
<body>
<div class="viewer-bar">
  <div class="wrap">
    <a class="back" href="index.html">&larr; 목록</a>
    <span class="crumb" id="crumb"></span>
  </div>
</div>

<main class="wrap doc-wrap" id="doc-wrap"></main>

<script>
// Reload on hash change so a new article loads cleanly.
let lastHash = location.hash;
window.addEventListener('hashchange', () => { if (location.hash !== lastHash) location.reload(); });

const path = decodeURIComponent(location.hash.slice(1)).trim();
const wrap = document.getElementById('doc-wrap');
const crumb = document.getElementById('crumb');

function looksSafe(p) {
  // local relative .md under public/, no scheme, no parent escape
  return p && p.endsWith('.md') && !/^([a-z]+:)?\/\//i.test(p) && !p.startsWith('/') && !p.includes('..');
}

if (!looksSafe(path)) {
  wrap.innerHTML = '<p class="notfound">글을 찾을 수 없습니다. <a href="index.html">목록으로 돌아가기</a></p>';
} else {
  crumb.textContent = path;
  const zm = document.createElement('zero-md');
  zm.setAttribute('src', path);
  wrap.appendChild(zm);

  // Title the tab from the document's first heading once rendered.
  zm.addEventListener('zero-md-rendered', () => {
    const h1 = zm.shadowRoot && zm.shadowRoot.querySelector('h1, h2');
    if (h1 && h1.textContent.trim()) document.title = h1.textContent.trim();
  });
}
</script>
</body>
</html>
