<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Study Notes</title>
<script>try{var t=localStorage.getItem('theme');if(t==='dark'||t==='light')document.documentElement.setAttribute('data-theme',t);}catch(e){}</script>
<link rel="stylesheet" href="assets/style.css?v=4">
<script defer src="assets/theme.js?v=4"></script>
</head>
<body>
<header class="site-head">
  <div class="wrap">
    <h1 id="site-title">Study Notes</h1>
    <p id="site-desc" class="desc"></p>
  </div>
</header>

<main class="wrap studies">
  <ul class="study-list" id="studies"></ul>
</main>

<footer class="foot">
  <div class="wrap">Written in Markdown, rendered by GitHub Pages. <a href="https://github.com/hhoikoo/study">Source</a></div>
</footer>

<script>
function el(tag, cls, html) { const n = document.createElement(tag); if (cls) n.className = cls; if (html != null) n.innerHTML = html; return n; }
function esc(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

fetch('manifest.json', { cache: 'no-store' })
  .then(r => r.json())
  .then(data => {
    if (data.site) {
      if (data.site.title) { document.title = data.site.title; document.getElementById('site-title').textContent = data.site.title; }
      document.getElementById('site-desc').textContent = data.site.description || '';
    }
    const root = document.getElementById('studies');
    const studies = data.studies || [];
    if (!studies.length) { root.appendChild(el('li', 'empty-study', 'No studies yet.')); return; }
    for (const s of studies) {
      const li = el('li', 'study-item');
      const href = encodeURIComponent(s.id) + '/';
      const count = (s.articles || []).length;
      li.appendChild(el('div', null, `<a class="title" href="${href}">${esc(s.title)}</a>`));
      if (s.description) li.appendChild(el('div', 'summary', esc(s.description)));
      li.appendChild(el('div', 'meta', count + (count === 1 ? ' article' : ' articles')));
      root.appendChild(li);
    }
  })
  .catch(err => { document.getElementById('studies').appendChild(el('li', 'empty-study', 'Failed to load: ' + esc(err.message))); });
</script>
</body>
</html>
