<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 320" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
<rect x="0" y="0" width="760" height="320" rx="12" fill="#fbfbfa"/>
<defs>
<marker id="rt" markerWidth="8" markerHeight="8" refX="6" refY="2.5" orient="auto"><path d="M0,0 L6,2.5 L0,5 Z" fill="#999"/></marker>
</defs>

<text x="30" y="34" fill="#333" font-size="14" font-weight="bold">Ring</text>
<text x="30" y="52" fill="#777" font-size="11">step 수 ∝ N (2(N-1)단계)</text>

<!-- ring of 6 nodes -->
<g>
<circle cx="120" cy="160" r="22" fill="#cdeccd" stroke="#9aa0a6"/><text x="120" y="164" fill="#333" font-size="11" text-anchor="middle">G0</text>
<circle cx="205" cy="115" r="22" fill="#cdeccd" stroke="#9aa0a6"/><text x="205" y="119" fill="#333" font-size="11" text-anchor="middle">G1</text>
<circle cx="290" cy="160" r="22" fill="#cdeccd" stroke="#9aa0a6"/><text x="290" y="164" fill="#333" font-size="11" text-anchor="middle">G2</text>
<circle cx="290" cy="240" r="22" fill="#cdeccd" stroke="#9aa0a6"/><text x="290" y="244" fill="#333" font-size="11" text-anchor="middle">G3</text>
<circle cx="205" cy="285" r="22" fill="#cdeccd" stroke="#9aa0a6"/><text x="205" y="289" fill="#333" font-size="11" text-anchor="middle">G4</text>
<circle cx="120" cy="240" r="22" fill="#cdeccd" stroke="#9aa0a6"/><text x="120" y="244" fill="#333" font-size="11" text-anchor="middle">G5</text>
<path d="M138,150 L188,123" stroke="#999" stroke-width="1.6" fill="none" marker-end="url(#rt)"/>
<path d="M223,124 L273,150" stroke="#999" stroke-width="1.6" fill="none" marker-end="url(#rt)"/>
<path d="M300,180 L300,218" stroke="#999" stroke-width="1.6" fill="none" marker-end="url(#rt)"/>
<path d="M273,250 L223,277" stroke="#999" stroke-width="1.6" fill="none" marker-end="url(#rt)"/>
<path d="M188,277 L138,250" stroke="#999" stroke-width="1.6" fill="none" marker-end="url(#rt)"/>
<path d="M112,218 L112,182" stroke="#999" stroke-width="1.6" fill="none" marker-end="url(#rt)"/>
</g>
<text x="205" y="205" fill="#777" font-size="10.5" text-anchor="middle">모든 링크 동시 사용</text>

<line x1="400" y1="60" x2="400" y2="280" stroke="#e2e2e2" stroke-width="1"/>

<text x="440" y="34" fill="#333" font-size="14" font-weight="bold">Tree</text>
<text x="440" y="52" fill="#777" font-size="11">depth ∝ log N</text>

<!-- binary tree depth 3 -->
<g>
<rect x="560" y="80" width="48" height="30" rx="5" fill="#cfe2f3" stroke="#9aa0a6"/><text x="584" y="100" fill="#333" font-size="11" text-anchor="middle">G0</text>
<rect x="490" y="160" width="48" height="30" rx="5" fill="#cfe2f3" stroke="#9aa0a6"/><text x="514" y="180" fill="#333" font-size="11" text-anchor="middle">G1</text>
<rect x="630" y="160" width="48" height="30" rx="5" fill="#cfe2f3" stroke="#9aa0a6"/><text x="654" y="180" fill="#333" font-size="11" text-anchor="middle">G2</text>
<rect x="455" y="240" width="48" height="30" rx="5" fill="#cfe2f3" stroke="#9aa0a6"/><text x="479" y="260" fill="#333" font-size="11" text-anchor="middle">G3</text>
<rect x="525" y="240" width="48" height="30" rx="5" fill="#cfe2f3" stroke="#9aa0a6"/><text x="549" y="260" fill="#333" font-size="11" text-anchor="middle">G4</text>
<rect x="595" y="240" width="48" height="30" rx="5" fill="#cfe2f3" stroke="#9aa0a6"/><text x="619" y="260" fill="#333" font-size="11" text-anchor="middle">G5</text>
<line x1="572" y1="110" x2="520" y2="158" stroke="#999" stroke-width="1.6"/>
<line x1="596" y1="110" x2="648" y2="158" stroke="#999" stroke-width="1.6"/>
<line x1="505" y1="190" x2="483" y2="238" stroke="#999" stroke-width="1.6"/>
<line x1="523" y1="190" x2="545" y2="238" stroke="#999" stroke-width="1.6"/>
<line x1="648" y1="190" x2="623" y2="238" stroke="#999" stroke-width="1.6"/>
</g>
<text x="584" y="300" fill="#777" font-size="10.5" text-anchor="middle">GPU 늘어도 깊이는 천천히 증가</text>
</svg>
