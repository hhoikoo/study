<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 330" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
<rect x="0" y="0" width="760" height="330" rx="12" fill="#fbfbfa"/>
<defs>
<marker id="ph" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#777"/></marker>
<marker id="phr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#c0392b"/></marker>
</defs>

<text x="30" y="32" fill="#333" font-size="13" font-weight="bold">PFC: 큐가 차면 상류를 멈춘다</text>
<g font-size="10.5" text-anchor="middle">
<rect x="40" y="50" width="80" height="40" rx="5" fill="#cfe2f3" stroke="#9aa0a6"/><text x="80" y="74" fill="#333">상류 스위치</text>
<rect x="230" y="50" width="80" height="40" rx="5" fill="#cfe2f3" stroke="#9aa0a6"/><text x="270" y="74" fill="#333">하류 스위치</text>
<rect x="320" y="44" width="14" height="52" rx="2" fill="#f5cccc" stroke="#9aa0a6"/>
<text x="327" y="110" fill="#c0392b" font-size="9">XOFF 초과</text>
</g>
<line x1="120" y1="62" x2="228" y2="62" stroke="#777" stroke-width="1.6" marker-end="url(#ph)"/>
<line x1="228" y1="80" x2="122" y2="80" stroke="#c0392b" stroke-width="1.6" marker-end="url(#phr)"/>
<text x="175" y="55" fill="#555" font-size="9.5" text-anchor="middle">데이터</text>
<text x="175" y="95" fill="#c0392b" font-size="9.5" text-anchor="middle">PAUSE (priority별)</text>

<line x1="380" y1="40" x2="380" y2="300" stroke="#e2e2e2" stroke-width="1"/>

<text x="400" y="32" fill="#333" font-size="13" font-weight="bold">부작용: 엉뚱한 victim flow도 멈춘다</text>
<g font-size="10" text-anchor="middle">
<rect x="410" y="60" width="70" height="32" rx="5" fill="#cdeccd" stroke="#9aa0a6"/><text x="445" y="80" fill="#333">victim</text>
<rect x="410" y="110" width="70" height="32" rx="5" fill="#fde9c8" stroke="#9aa0a6"/><text x="445" y="130" fill="#333">incast 발신</text>
<rect x="560" y="60" width="60" height="32" rx="5" fill="#cfe2f3" stroke="#9aa0a6"/><text x="590" y="80" fill="#333">공유 링크</text>
<rect x="660" y="85" width="70" height="32" rx="5" fill="#f5cccc" stroke="#9aa0a6"/><text x="695" y="105" fill="#333">병목</text>
</g>
<line x1="480" y1="76" x2="558" y2="76" stroke="#777" stroke-width="1.5" marker-end="url(#ph)"/>
<line x1="480" y1="126" x2="600" y2="100" stroke="#777" stroke-width="1.5" marker-end="url(#ph)"/>
<line x1="620" y1="80" x2="658" y2="95" stroke="#777" stroke-width="1.5" marker-end="url(#ph)"/>
<path d="M658,108 C600,150 540,140 482,90" stroke="#c0392b" stroke-width="1.6" fill="none" stroke-dasharray="5 3" marker-end="url(#phr)"/>
<text x="560" y="175" fill="#c0392b" font-size="10" text-anchor="middle">PAUSE가 공유 링크를 타고 거슬러 올라</text>
<text x="560" y="192" fill="#c0392b" font-size="10" text-anchor="middle">경로도 안 겹치는 victim까지 멈춘다</text>

<text x="400" y="240" fill="#555" font-size="11" font-weight="bold">DCQCN 논문 측정 (incast)</text>
<text x="400" y="260" fill="#555" font-size="10.5">victim 기대 20Gbps → HOL blocking으로 4.5Gbps</text>
<text x="400" y="278" fill="#777" font-size="10.5">PFC는 port 단위라 flow를 구분하지 못한다</text>
</svg>
