<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 280" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
<rect x="0" y="0" width="760" height="280" rx="12" fill="#fbfbfa"/>
<defs>
<marker id="dl" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#777"/></marker>
<marker id="dlb" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#0969da"/></marker>
</defs>

<g text-anchor="middle">
<rect x="40" y="90" width="150" height="70" rx="8" fill="#fde9c8" stroke="#9aa0a6"/>
<text x="115" y="118" fill="#333" font-size="13" font-weight="bold">RP</text>
<text x="115" y="138" fill="#555" font-size="10.5">발신 NIC</text>
<text x="115" y="152" fill="#777" font-size="9.5">rate 조절</text>

<rect x="305" y="90" width="150" height="70" rx="8" fill="#cfe2f3" stroke="#9aa0a6"/>
<text x="380" y="118" fill="#333" font-size="13" font-weight="bold">CP</text>
<text x="380" y="138" fill="#555" font-size="10.5">스위치 큐</text>
<text x="380" y="152" fill="#777" font-size="9.5">임계 넘으면 ECN mark</text>

<rect x="570" y="90" width="150" height="70" rx="8" fill="#cdeccd" stroke="#9aa0a6"/>
<text x="645" y="118" fill="#333" font-size="13" font-weight="bold">NP</text>
<text x="645" y="138" fill="#555" font-size="10.5">수신 NIC</text>
<text x="645" y="152" fill="#777" font-size="9.5">CE 보면 CNP 발사</text>
</g>

<line x1="190" y1="112" x2="303" y2="112" stroke="#777" stroke-width="1.8" marker-end="url(#dl)"/>
<text x="246" y="104" fill="#555" font-size="10" text-anchor="middle">데이터 (ECT)</text>
<line x1="455" y1="112" x2="568" y2="112" stroke="#777" stroke-width="1.8" marker-end="url(#dl)"/>
<text x="512" y="104" fill="#555" font-size="10" text-anchor="middle">CE 표시됨</text>

<path d="M645,162 C645,215 380,225 200,160" stroke="#0969da" stroke-width="1.8" fill="none" marker-end="url(#dlb)"/>
<text x="420" y="232" fill="#0969da" font-size="11" text-anchor="middle">CNP (50us마다 최대 1개, 높은 우선순위)</text>

<text x="115" y="200" fill="#c0392b" font-size="10.5" text-anchor="middle">rate ← rate(1 − α/2)</text>
<text x="40" y="42" fill="#333" font-size="12" font-weight="bold">DCQCN: drop 대신 표시하고, 끝단에서 속도를 줄인다</text>
<text x="40" y="60" fill="#777" font-size="10.5">전부 NIC 하드웨어에서 동작. slow start 없이 line rate로 시작</text>
</svg>
