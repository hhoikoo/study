<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
<rect x="0" y="0" width="760" height="300" rx="12" fill="#fbfbfa"/>

<text x="30" y="34" fill="#333" font-size="14" font-weight="bold">InfiniBand</text>
<text x="30" y="270" fill="#777" font-size="11">L2/L3가 fabric 전용 (LRH/GRH)</text>

<!-- IB stack -->
<g font-size="11" text-anchor="middle">
<rect x="30" y="48" width="150" height="30" rx="4" fill="#cfe2f3" stroke="#9aa0a6"/><text x="105" y="68" fill="#333">LRH (8B)</text>
<rect x="30" y="82" width="150" height="30" rx="4" fill="#cfe2f3" stroke="#9aa0a6"/><text x="105" y="102" fill="#333">GRH (40B, 선택)</text>
<rect x="30" y="116" width="150" height="30" rx="4" fill="#fde9c8" stroke="#9aa0a6"/><text x="105" y="136" fill="#333">BTH (12B)</text>
<rect x="30" y="150" width="150" height="30" rx="4" fill="#fde9c8" stroke="#9aa0a6"/><text x="105" y="170" fill="#333">RETH (16B)</text>
<rect x="30" y="184" width="150" height="34" rx="4" fill="#cdeccd" stroke="#9aa0a6"/><text x="105" y="205" fill="#333">Payload</text>
<rect x="30" y="222" width="150" height="26" rx="4" fill="#e2e2e2" stroke="#9aa0a6"/><text x="105" y="239" fill="#333">ICRC(4) VCRC(2)</text>
</g>

<!-- arrow -->
<text x="270" y="150" fill="#999" font-size="22">→</text>
<text x="235" y="172" fill="#777" font-size="10" text-anchor="middle">교체</text>

<text x="330" y="34" fill="#333" font-size="14" font-weight="bold">RoCEv2</text>
<text x="330" y="270" fill="#777" font-size="11">L2/L3는 Ethernet/IP/UDP, transport는 그대로</text>

<!-- RoCEv2 stack -->
<g font-size="11" text-anchor="middle">
<rect x="330" y="48" width="150" height="30" rx="4" fill="#f5cccc" stroke="#9aa0a6"/><text x="405" y="68" fill="#333">Ethernet</text>
<rect x="330" y="82" width="150" height="30" rx="4" fill="#f5cccc" stroke="#9aa0a6"/><text x="405" y="102" fill="#333">IP + UDP (:4791)</text>
<rect x="330" y="116" width="150" height="30" rx="4" fill="#fde9c8" stroke="#9aa0a6"/><text x="405" y="136" fill="#333">BTH (12B)</text>
<rect x="330" y="150" width="150" height="30" rx="4" fill="#fde9c8" stroke="#9aa0a6"/><text x="405" y="170" fill="#333">RETH (16B)</text>
<rect x="330" y="184" width="150" height="34" rx="4" fill="#cdeccd" stroke="#9aa0a6"/><text x="405" y="205" fill="#333">Payload</text>
<rect x="330" y="222" width="150" height="26" rx="4" fill="#e2e2e2" stroke="#9aa0a6"/><text x="405" y="239" fill="#333">ICRC(4)</text>
</g>

<!-- BTH zoom -->
<text x="545" y="120" fill="#333" font-size="12" font-weight="bold">BTH 핵심 필드</text>
<g font-size="10.5">
<text x="545" y="142" fill="#555">OpCode (8b): 동작 종류</text>
<text x="545" y="162" fill="#555">DestQP (24b): 목적지 큐</text>
<text x="545" y="182" fill="#555">PSN (24b): 순서/재전송</text>
<text x="545" y="202" fill="#555">AckReq (1b): ACK 요청</text>
<text x="545" y="232" fill="#777">RETH = 원격 VA + R_Key + 길이</text>
</g>
</svg>
