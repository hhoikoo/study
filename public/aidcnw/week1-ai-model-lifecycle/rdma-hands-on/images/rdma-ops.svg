<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 320" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
<rect x="0" y="0" width="760" height="320" rx="12" fill="#fbfbfa"/>
<defs><marker id="op" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#777"/></marker></defs>

<!-- columns: Requester | Responder -->
<text x="150" y="30" fill="#333" font-size="12" font-weight="bold" text-anchor="middle">Requester</text>
<text x="610" y="30" fill="#333" font-size="12" font-weight="bold" text-anchor="middle">Responder</text>
<line x1="150" y1="40" x2="150" y2="300" stroke="#cfcfcf" stroke-width="1"/>
<line x1="610" y1="40" x2="610" y2="300" stroke="#cfcfcf" stroke-width="1"/>

<!-- RDMA Write -->
<text x="30" y="72" fill="#333" font-size="13" font-weight="bold">RDMA Write</text>
<text x="30" y="90" fill="#777" font-size="10.5">one-sided</text>
<line x1="150" y1="78" x2="608" y2="78" stroke="#777" stroke-width="1.6" marker-end="url(#op)"/>
<text x="380" y="71" fill="#555" font-size="10.5" text-anchor="middle">WRITE + RETH(원격 주소·rkey) → 직접 DMA</text>
<line x1="610" y1="98" x2="152" y2="98" stroke="#bbb" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#op)"/>
<text x="380" y="113" fill="#999" font-size="10" text-anchor="middle">ACK</text>
<text x="625" y="82" fill="#0a7d28" font-size="10.5">CPU 무관</text>

<!-- RDMA Read -->
<text x="30" y="162" fill="#333" font-size="13" font-weight="bold">RDMA Read</text>
<text x="30" y="180" fill="#777" font-size="10.5">one-sided</text>
<line x1="150" y1="168" x2="608" y2="168" stroke="#777" stroke-width="1.6" marker-end="url(#op)"/>
<text x="380" y="161" fill="#555" font-size="10.5" text-anchor="middle">READ Request + RETH</text>
<line x1="610" y1="190" x2="152" y2="190" stroke="#777" stroke-width="1.6" marker-end="url(#op)"/>
<text x="380" y="205" fill="#555" font-size="10.5" text-anchor="middle">READ Response (데이터 + AETH)</text>
<text x="625" y="172" fill="#0a7d28" font-size="10.5">CPU 무관</text>

<!-- Send/Recv -->
<text x="30" y="252" fill="#333" font-size="13" font-weight="bold">Send / Recv</text>
<text x="30" y="270" fill="#777" font-size="10.5">two-sided</text>
<text x="625" y="248" fill="#c0392b" font-size="10.5">recv 선등록</text>
<rect x="560" y="256" width="100" height="22" rx="4" fill="#f5cccc" stroke="#9aa0a6"/><text x="610" y="271" fill="#333" font-size="10" text-anchor="middle">Recv Queue 대기</text>
<line x1="150" y1="288" x2="608" y2="288" stroke="#777" stroke-width="1.6" marker-end="url(#op)"/>
<text x="370" y="303" fill="#555" font-size="10.5" text-anchor="middle">SEND → responder가 미리 올린 recv 버퍼를 소비</text>
</svg>
