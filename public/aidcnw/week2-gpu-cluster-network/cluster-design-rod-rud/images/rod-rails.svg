<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 380" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
<rect x="0" y="0" width="760" height="380" rx="12" fill="#fbfbfa"/>
<defs><marker id="ra" markerWidth="8" markerHeight="8" refX="6" refY="2.5" orient="auto"><path d="M0,0 L6,2.5 L0,5 Z" fill="#999"/></marker></defs>

<text x="30" y="30" fill="#333" font-size="14" font-weight="bold">ROD: rail 안은 one-hop, rail을 넘으면 spine을 타는 two-hop</text>

<!-- Spine -->
<rect x="330" y="70" width="100" height="30" rx="6" fill="#fde9c8" stroke="#9aa0a6"/>
<text x="380" y="90" fill="#333" font-size="11" text-anchor="middle">Spine</text>

<!-- Rail leaves -->
<g font-size="9.5" text-anchor="middle">
<rect x="150" y="150" width="74" height="28" rx="5" fill="#cfe2f3" stroke="#9aa0a6"/><text x="187" y="168" fill="#333">Leaf Rail0</text>
<rect x="270" y="150" width="74" height="28" rx="5" fill="#cfe2f3" stroke="#9aa0a6"/><text x="307" y="168" fill="#333">Leaf Rail1</text>
<rect x="420" y="150" width="74" height="28" rx="5" fill="#cfe2f3" stroke="#9aa0a6"/><text x="457" y="168" fill="#333">Leaf Rail3</text>
<rect x="540" y="150" width="74" height="28" rx="5" fill="#cfe2f3" stroke="#9aa0a6"/><text x="577" y="168" fill="#777">Leaf Rail7</text>
</g>
<text x="368" y="168" fill="#777" font-size="13" text-anchor="middle">...</text>

<!-- Server A -->
<rect x="60" y="250" width="150" height="100" rx="8" fill="none" stroke="#bbb" stroke-width="1.2"/>
<text x="135" y="268" fill="#333" font-size="11" text-anchor="middle" font-weight="bold">Server A</text>
<g font-size="9" text-anchor="middle">
<rect x="74" y="278" width="56" height="22" rx="4" fill="#cdeccd" stroke="#9aa0a6"/><text x="102" y="293" fill="#333">GPU0</text>
<rect x="140" y="278" width="56" height="22" rx="4" fill="#cdeccd" stroke="#9aa0a6"/><text x="168" y="293" fill="#333">GPU3</text>
<rect x="74" y="310" width="122" height="20" rx="4" fill="#eee" stroke="#9aa0a6"/><text x="135" y="324" fill="#555">내부 NVSwitch</text>
</g>

<!-- Server B -->
<rect x="540" y="250" width="150" height="100" rx="8" fill="none" stroke="#bbb" stroke-width="1.2"/>
<text x="615" y="268" fill="#333" font-size="11" text-anchor="middle" font-weight="bold">Server B</text>
<g font-size="9" text-anchor="middle">
<rect x="554" y="278" width="56" height="22" rx="4" fill="#cdeccd" stroke="#9aa0a6"/><text x="582" y="293" fill="#333">GPU0</text>
<rect x="620" y="278" width="56" height="22" rx="4" fill="#cdeccd" stroke="#9aa0a6"/><text x="648" y="293" fill="#333">GPU3</text>
<rect x="554" y="310" width="122" height="20" rx="4" fill="#eee" stroke="#9aa0a6"/><text x="615" y="324" fill="#555">내부 NVSwitch</text>
</g>

<!-- intra-rail: A GPU0 -> Leaf Rail0 -> B GPU0 (green, one-hop) -->
<line x1="102" y1="278" x2="180" y2="178" stroke="#2e9e54" stroke-width="2" marker-end="url(#ra)"/>
<line x1="194" y1="178" x2="575" y2="278" stroke="#2e9e54" stroke-width="2" marker-end="url(#ra)"/>
<text x="300" y="230" fill="#2e9e54" font-size="10">intra-rail: GPU0 ↔ GPU0, Leaf 하나만 (one-hop)</text>

<!-- inter-rail: A GPU0 -> Leaf0 -> Spine -> Leaf Rail3 -> B GPU3 (gray, two-hop) -->
<line x1="168" y1="278" x2="307" y2="178" stroke="#b06a2c" stroke-width="1.6" stroke-dasharray="5 3"/>
<line x1="307" y1="150" x2="360" y2="100" stroke="#b06a2c" stroke-width="1.6" stroke-dasharray="5 3"/>
<line x1="400" y1="100" x2="457" y2="150" stroke="#b06a2c" stroke-width="1.6" stroke-dasharray="5 3"/>
<line x1="457" y1="178" x2="648" y2="278" stroke="#b06a2c" stroke-width="1.6" stroke-dasharray="5 3" marker-end="url(#ra)"/>
<text x="395" y="128" fill="#b06a2c" font-size="10" text-anchor="middle">inter-rail: GPU0 ↔ GPU3, Leaf → Spine → Leaf (two-hop)</text>
</svg>
