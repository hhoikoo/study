<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360" font-family="-apple-system,Segoe UI,Roboto,sans-serif">
<rect x="0" y="0" width="760" height="360" rx="12" fill="#fbfbfa"/>
<defs><marker id="dt" markerWidth="8" markerHeight="8" refX="6" refY="2.5" orient="auto"><path d="M0,0 L6,2.5 L0,5 Z" fill="#999"/></marker></defs>

<text x="30" y="30" fill="#333" font-size="14" font-weight="bold">DCQCN: ECN threshold을 PFC XOFF보다 낮게 둔다</text>
<text x="30" y="49" fill="#777" font-size="11">큐가 차는 순서대로 ECN이 먼저 부드럽게, PFC가 마지막에 강하게</text>

<!-- Queue bar -->
<rect x="90" y="80" width="90" height="240" rx="6" fill="#fff" stroke="#9aa0a6"/>
<text x="135" y="338" fill="#555" font-size="10.5" text-anchor="middle">스위치 큐 점유</text>

<!-- fill levels -->
<rect x="92" y="232" width="86" height="86" fill="#cdeccd"/>
<rect x="92" y="150" width="86" height="82" fill="#fff3cd"/>
<rect x="92" y="100" width="86" height="50" fill="#f6cccc"/>

<!-- ECN threshold line -->
<line x1="90" y1="232" x2="540" y2="232" stroke="#2e9e54" stroke-width="1.5" stroke-dasharray="5 3"/>
<text x="196" y="228" fill="#2e9e54" font-size="11" font-weight="bold">ECN threshold (낮음)</text>
<text x="196" y="258" fill="#555" font-size="10.5">큐가 여기 닿으면 패킷에 ECN 표시(CE)</text>
<text x="196" y="274" fill="#555" font-size="10.5">→ 수신 NIC가 CNP를 발신자에게 → rate ↓</text>
<text x="196" y="290" fill="#2e9e54" font-size="10.5">flow 단위, 부드러움. 보통 여기서 끝.</text>

<!-- PFC XOFF threshold line -->
<line x1="90" y1="150" x2="540" y2="150" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="5 3"/>
<text x="196" y="128" fill="#c0392b" font-size="11" font-weight="bold">PFC XOFF threshold (높음)</text>
<text x="196" y="146" fill="#555" font-size="10.5">ECN으로도 못 막고 더 차면 PFC PAUSE</text>
<text x="196" y="108" fill="#c0392b" font-size="10.5">priority class 전체를 멈춤. 마지막 방어선.</text>

<!-- Drop at top -->
<text x="196" y="94" fill="#777" font-size="10">맨 위까지 차면 drop</text>

<!-- arrow showing growth -->
<line x1="70" y1="318" x2="70" y2="90" stroke="#999" stroke-width="1.3" marker-end="url(#dt)"/>
<text x="58" y="200" fill="#777" font-size="10" text-anchor="middle" transform="rotate(-90 58 200)">큐 점유 증가</text>
</svg>
