<svg xmlns="http://www.w3.org/2000/svg" width="680" height="260" viewBox="0 0 680 260" font-family="-apple-system, Segoe UI, Noto Sans KR, sans-serif">
  <rect width="680" height="260" fill="#ffffff"/>

  <!-- TCP path -->
  <text x="20" y="34" font-size="15" font-weight="700" fill="#1f2328">TCP/IP</text>
  <g font-size="12" fill="#1f2328">
    <rect x="20"  y="48" width="96" height="40" rx="6" fill="#f6f8fa" stroke="#d1d9e0"/>
    <text x="68"  y="72" text-anchor="middle">App memory</text>
    <rect x="148" y="48" width="96" height="40" rx="6" fill="#fff1e7" stroke="#d1d9e0"/>
    <text x="196" y="68" text-anchor="middle">Kernel</text>
    <text x="196" y="82" text-anchor="middle" font-size="10" fill="#59636e">copy + TCP</text>
    <rect x="276" y="48" width="72" height="40" rx="6" fill="#f6f8fa" stroke="#d1d9e0"/>
    <text x="312" y="72" text-anchor="middle">NIC</text>
    <rect x="380" y="48" width="80" height="40" rx="6" fill="#eef4ff" stroke="#d1d9e0"/>
    <text x="420" y="72" text-anchor="middle">Network</text>
    <rect x="492" y="48" width="72" height="40" rx="6" fill="#f6f8fa" stroke="#d1d9e0"/>
    <text x="528" y="72" text-anchor="middle">NIC</text>
    <rect x="584" y="48" width="76" height="40" rx="6" fill="#fff1e7" stroke="#d1d9e0"/>
    <text x="622" y="68" text-anchor="middle">Kernel</text>
    <text x="622" y="82" text-anchor="middle" font-size="10" fill="#59636e">copy</text>
  </g>
  <g stroke="#8b949e" stroke-width="1.5" fill="none" marker-end="url(#a)">
    <path d="M116 68 H146"/>
    <path d="M244 68 H274"/>
    <path d="M348 68 H378"/>
    <path d="M460 68 H490"/>
    <path d="M564 68 H582"/>
  </g>
  <text x="20" y="116" font-size="11" fill="#59636e">커널 경유 + 메모리 복사. 패킷마다 CPU 개입.</text>

  <!-- RDMA path -->
  <text x="20" y="166" font-size="15" font-weight="700" fill="#1f2328">RDMA</text>
  <g font-size="12" fill="#1f2328">
    <rect x="20"  y="180" width="96" height="40" rx="6" fill="#f6f8fa" stroke="#d1d9e0"/>
    <text x="68"  y="204" text-anchor="middle">App memory</text>
    <rect x="148" y="180" width="72" height="40" rx="6" fill="#e9f5ec" stroke="#2da44e"/>
    <text x="184" y="204" text-anchor="middle">NIC</text>
    <rect x="252" y="180" width="80" height="40" rx="6" fill="#eef4ff" stroke="#d1d9e0"/>
    <text x="292" y="204" text-anchor="middle">Network</text>
    <rect x="364" y="180" width="72" height="40" rx="6" fill="#e9f5ec" stroke="#2da44e"/>
    <text x="400" y="204" text-anchor="middle">NIC</text>
    <rect x="468" y="180" width="96" height="40" rx="6" fill="#f6f8fa" stroke="#d1d9e0"/>
    <text x="516" y="204" text-anchor="middle">App memory</text>
  </g>
  <g stroke="#2da44e" stroke-width="1.5" fill="none" marker-end="url(#b)">
    <path d="M116 200 H146"/>
    <path d="M220 200 H250"/>
    <path d="M332 200 H362"/>
    <path d="M436 200 H466"/>
  </g>
  <text x="20" y="244" font-size="11" fill="#59636e">커널 우회(kernel bypass) + zero-copy. NIC가 메모리에 직접 접근.</text>

  <defs>
    <marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0 0 L6 3 L0 6 z" fill="#8b949e"/></marker>
    <marker id="b" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0 0 L6 3 L0 6 z" fill="#2da44e"/></marker>
  </defs>
</svg>
